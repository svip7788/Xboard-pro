<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xboard-pro 一键更新</title>
  <style>
    :root {
      --bg: #0b0f17;
      --card: #131a26;
      --border: #1f2a3a;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fa;
        --card: #ffffff;
        --border: #d0d7de;
        --text: #1f2328;
        --muted: #57606a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 1.6rem;
      margin: 0 0 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--accent);
      color: #fff;
      font-weight: normal;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1rem;
      margin: 0 0 16px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .row > * { flex: 1; }
    button {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.danger {
      background: var(--danger);
    }
    .info-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px 16px;
      font-size: 0.9rem;
    }
    .info-grid .label {
      color: var(--muted);
    }
    .info-grid code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .commit-list {
      max-height: 280px;
      overflow-y: auto;
      margin-top: 12px;
      padding-right: 8px;
    }
    .commit {
      padding: 10px 12px;
      border-left: 3px solid var(--border);
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .commit.local {
      border-left-color: var(--warning);
    }
    .commit .sha {
      font-family: SF Mono, Menlo, Consolas, monospace;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .commit .msg {
      color: var(--text);
      margin-top: 2px;
      word-break: break-word;
    }
    .commit .meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .log {
      background: #0a0e15;
      color: #c9d1d9;
      padding: 14px 16px;
      border-radius: 8px;
      font-family: SF Mono, Menlo, Consolas, monospace;
      font-size: 0.8rem;
      max-height: 360px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log .ok { color: #56d364; }
    .log .err { color: #ff7b72; }
    .log .warn { color: #d29922; }
    .status {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }
    .status.ok { background: rgba(16, 185, 129, 0.15); color: var(--success); display: block; }
    .status.err { background: rgba(239, 68, 68, 0.15); color: var(--danger); display: block; }
    .status.warn { background: rgba(245, 158, 11, 0.15); color: var(--warning); display: block; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Xboard-pro 一键更新 <span class="badge">fork</span></h1>

    <div class="card" id="authCard">
      <h2>访问配置</h2>
      <div class="field">
        <label>Admin 后台路径 (secure_path)</label>
        <input type="text" id="securePath" placeholder="例如 abc123def，登录后台后 URL 里 /xxx/dashboard 的 xxx">
      </div>
      <div class="field">
        <label>Admin Token (留空将自动从 localStorage 读取)</label>
        <input type="text" id="token" placeholder="未填则自动用 XBOARD_ACCESS_TOKEN">
      </div>
      <div class="row">
        <button onclick="checkUpdate()">检查更新</button>
        <button class="secondary" onclick="clearConfig()">清除保存的配置</button>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div class="card hidden" id="resultCard">
      <h2>版本信息</h2>
      <div class="info-grid" id="versionInfo"></div>
      <div id="commitsBlock" class="hidden">
        <div style="margin-top: 18px; margin-bottom: 6px; font-size: 0.85rem; color: var(--muted);">更新日志:</div>
        <div class="commit-list" id="commitList"></div>
      </div>
      <div style="margin-top: 18px;" id="executeBlock"></div>
    </div>

    <div class="card hidden" id="logCard">
      <h2>执行日志</h2>
      <div class="log" id="logOutput"></div>
    </div>
  </div>

<script>
const LS_KEY = 'admin_update_config_v1';
const TOKEN_LS_KEY = 'XBOARD_ACCESS_TOKEN';

function $(id) { return document.getElementById(id); }
function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }

function setStatus(msg, type) {
  const el = $('status');
  el.className = 'status ' + (type || '');
  el.textContent = msg;
}

function clearStatus() { $('status').className = 'status'; $('status').textContent = ''; }

function getStoredToken() {
  try {
    const raw = localStorage.getItem(TOKEN_LS_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (obj && obj.value) return obj.value;
  } catch (e) {}
  return null;
}

function loadConfig() {
  try {
    const cfg = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (cfg.securePath) $('securePath').value = cfg.securePath;
  } catch (e) {}
}

function saveConfig() {
  localStorage.setItem(LS_KEY, JSON.stringify({
    securePath: $('securePath').value.trim(),
  }));
}

function clearConfig() {
  localStorage.removeItem(LS_KEY);
  $('securePath').value = '';
  $('token').value = '';
  setStatus('已清除本地保存的配置', 'warn');
}

function getApiBase() {
  const sp = $('securePath').value.trim();
  if (!sp) {
    setStatus('请填写 Admin 后台路径 (secure_path)', 'err');
    throw new Error('missing secure_path');
  }
  return '/api/v2/' + sp;
}

function getToken() {
  const manual = $('token').value.trim();
  if (manual) return manual;
  const stored = getStoredToken();
  if (stored) return stored;
  setStatus('未找到 Admin Token，请手动填写或先在后台登录一次', 'err');
  throw new Error('missing token');
}

function log(msg, type) {
  const el = $('logOutput');
  show($('logCard'));
  const span = document.createElement('span');
  if (type) span.className = type;
  span.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

async function checkUpdate() {
  saveConfig();
  clearStatus();
  hide($('resultCard'));
  hide($('logCard'));
  $('logOutput').innerHTML = '';

  let base, token;
  try { base = getApiBase(); token = getToken(); } catch { return; }

  setStatus('正在检查更新…', '');
  $('status').innerHTML = '<span class="spinner"></span>正在检查更新…';

  try {
    const res = await fetch(base + '/update/check', {
      headers: { 'Authorization': token, 'Accept': 'application/json' }
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.message || ('HTTP ' + res.status));
    renderResult(body.data || {});
    clearStatus();
  } catch (e) {
    setStatus('检查失败: ' + e.message, 'err');
  }
}

function renderResult(data) {
  show($('resultCard'));
  $('versionInfo').innerHTML = '';

  const rows = [
    ['当前版本', '<code>' + (data.current_version || '-') + '</code>'],
    ['最新版本', '<code>' + (data.latest_version || '-') + '</code>'],
    ['有可用更新', data.has_update ? '<span style="color:var(--success);">是</span>' : '<span style="color:var(--muted);">否（已是最新）</span>'],
    ['本地是否领先', data.is_local_newer ? '<span style="color:var(--warning);">是（本地比 fork 还新，无需更新）</span>' : '否'],
    ['发布时间', data.published_at || '-'],
    ['作者', data.author || '-'],
  ];
  for (const [k, v] of rows) {
    $('versionInfo').insertAdjacentHTML('beforeend',
      '<div class="label">' + k + '</div><div>' + v + '</div>');
  }

  const logs = data.update_logs || [];
  if (logs.length > 0) {
    show($('commitsBlock'));
    $('commitList').innerHTML = logs.map(c => `
      <div class="commit ${c.is_local ? 'local' : ''}">
        <div class="sha">${c.version || ''}${c.is_local ? ' (local)' : ''}</div>
        <div class="msg">${escapeHtml(c.message || '')}</div>
        <div class="meta">${escapeHtml(c.author || '')} · ${new Date(c.date).toLocaleString()}</div>
      </div>
    `).join('');
  } else {
    hide($('commitsBlock'));
  }

  const exec = $('executeBlock');
  if (data.has_update && !data.is_local_newer) {
    exec.innerHTML = '<button class="danger" onclick="executeUpdate()">立即更新（不可中断，建议低峰期执行）</button>';
  } else {
    exec.innerHTML = '<button disabled>无可用更新</button>';
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

async function executeUpdate() {
  if (!confirm('⚠️ 即将执行一键更新：\n\n1. 备份数据库\n2. git pull 最新代码\n3. composer 装依赖\n4. 数据库迁移\n5. 清缓存 + 重启 Octane/Horizon\n\n执行期间网站短暂可能 503。\n失败会自动 git reset 回滚到当前版本。\n\n确定继续？')) return;

  let base, token;
  try { base = getApiBase(); token = getToken(); } catch { return; }

  show($('logCard'));
  $('logOutput').innerHTML = '';
  log('开始更新…', 'warn');
  setStatus('更新中，请勿关闭页面…', 'warn');
  $('status').innerHTML = '<span class="spinner"></span>更新中，请勿关闭页面…(过程可能需要 1-3 分钟)';

  document.querySelectorAll('#executeBlock button').forEach(b => b.disabled = true);

  try {
    const res = await fetch(base + '/update/execute', {
      method: 'POST',
      headers: { 'Authorization': token, 'Accept': 'application/json', 'Content-Type': 'application/json' }
    });
    const body = await res.json();
    if (res.ok && body.data && body.data.success) {
      log('✓ 更新成功', 'ok');
      log('版本: ' + body.data.update_info.from_version + ' → ' + body.data.update_info.to_version, 'ok');
      if (body.data.update_info.update_logs) {
        for (const line of body.data.update_info.update_logs) log(line);
      }
      log('Octane / Horizon 已重启，新代码已生效。', 'ok');
      setStatus('更新成功！页面已是最新状态。', 'ok');
    } else {
      const msg = (body.data && body.data.message) || body.message || ('HTTP ' + res.status);
      log('✗ 更新失败: ' + msg, 'err');
      setStatus('更新失败: ' + msg, 'err');
    }
  } catch (e) {
    log('✗ 网络/请求异常: ' + e.message, 'err');
    setStatus('更新失败: ' + e.message + '（若服务正在重启，1 分钟后重试检查）', 'err');
  } finally {
    document.querySelectorAll('#executeBlock button').forEach(b => b.disabled = false);
  }
}

loadConfig();
if (getStoredToken()) {
  setStatus('已自动识别后台登录 token（XBOARD_ACCESS_TOKEN）', 'ok');
}
</script>
</body>
</html>
